name: release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  BINARY_NAME: hya
  TARGET: x86_64-unknown-linux-gnu

jobs:
  build:
    name: build release binary
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Bun 1.3.14
        shell: bash
        run: |
          curl -fsSL https://bun.sh/install | bash -s "bun-v1.3.14"
          test "$("$HOME/.bun/bin/bun" --version)" = "1.3.14"
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Prepare TypeScript TUI
        working-directory: packages/hya-tui-ts
        run: |
          "$HOME/.bun/bin/bun" install --frozen-lockfile
          "$HOME/.bun/bin/bun" run build

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Validate tag version and changelog
        id: version
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          if [[ "$tag" == "$version" || -z "$version" ]]; then
            echo "release tags must be prefixed with v" >&2
            exit 1
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "version $version is not semver-shaped" >&2
            exit 1
          fi

          cargo_version="$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json, sys; metadata = json.load(sys.stdin); print(next(package["version"] for package in metadata["packages"] if package["name"] == "hya"))')"
          if [[ "$cargo_version" != "$version" ]]; then
            echo "tag version $version does not match hya version $cargo_version" >&2
            exit 1
          fi

          if [[ ! -s CHANGELOG.md ]]; then
            echo "CHANGELOG.md must exist and contain the newest release notes" >&2
            exit 1
          fi
          first_heading="$(grep -m1 -E '^# ' CHANGELOG.md || true)"
          if [[ "$first_heading" != "# $version" ]]; then
            echo "CHANGELOG.md first heading must be # $version" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build release binaries
        shell: bash
        run: cargo build --release --locked -p hya -p hya-backend -p hya-ts --bins --target "$TARGET"

      - name: Package release asset
        id: package
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          version="$VERSION"
          package_dir="${BINARY_NAME}-${version}-${TARGET}"
          archive="${package_dir}.tar.gz"

          rm -rf dist
          runtime="dist/$package_dir/lib/hya/hya-tui-ts"
          mkdir -p "dist/$package_dir/bin" "$runtime/src"
          cp "target/$TARGET/release/hya" "target/$TARGET/release/hya-backend" \
            "target/$TARGET/release/hya-ts" "dist/$package_dir/bin/"
          cp README.md "dist/$package_dir/"
          chmod 755 "dist/$package_dir/bin/hya" "dist/$package_dir/bin/hya-backend" \
            "dist/$package_dir/bin/hya-ts"
          cp packages/hya-tui-ts/package.json packages/hya-tui-ts/bun.lock \
            packages/hya-tui-ts/bunfig.toml packages/hya-tui-ts/tsconfig.json \
            packages/hya-tui-ts/LICENSE packages/hya-tui-ts/UPSTREAM.md "$runtime/"
          cp -R packages/hya-tui-ts/src/. "$runtime/src/"
          (cd "$runtime" && "$HOME/.bun/bin/bun" install --frozen-lockfile --production)
          "$HOME/.bun/bin/bun" packages/hya-tui-ts/scripts/prune-sdk-server.ts "$runtime"

          tar -czf "dist/$archive" -C dist "$package_dir"
          (cd dist && sha256sum "$archive" > SHA256SUMS)

          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Smoke test packaged binary
        shell: bash
        env:
          ARCHIVE: ${{ steps.package.outputs.archive }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          version="$VERSION"
          package_dir="${BINARY_NAME}-${version}-${TARGET}"
          scratch="$(mktemp -d)"
          trap 'rm -rf "$scratch"' EXIT

          tar -xzf "dist/$ARCHIVE" -C "$scratch"
          packaged_binary="$scratch/$package_dir/bin/hya"
          "$packaged_binary" --version | tee "$scratch/version.txt"
          grep -F "$version" "$scratch/version.txt"
          "$packaged_binary" --help >/dev/null
          "$scratch/$package_dir/bin/hya-backend" --help >/dev/null
          "$scratch/$package_dir/bin/hya-ts" --help >/dev/null
          runtime="$scratch/$package_dir/lib/hya/hya-tui-ts"
          test -f "$runtime/package.json"
          test -f "$runtime/bun.lock"
          test -f "$runtime/bunfig.toml"
          test -f "$runtime/tsconfig.json"
          test -f "$runtime/src/main.tsx"
          cmp packages/hya-tui-ts/LICENSE "$runtime/LICENSE"
          cmp packages/hya-tui-ts/UPSTREAM.md "$runtime/UPSTREAM.md"
          test -d "$runtime/node_modules"
          sdk="$runtime/node_modules/@opencode-ai/sdk"
          (cd "$runtime" && "$HOME/.bun/bin/bun" -e 'import { createOpencodeClient } from "@opencode-ai/sdk/v2"; if (typeof createOpencodeClient !== "function") process.exit(1)')
          test -f "$sdk/dist/v2/client.js"
          for path in dist/index.js dist/index.d.ts dist/server.js dist/server.d.ts dist/v2/index.js dist/v2/index.d.ts dist/v2/server.js dist/v2/server.d.ts dist/process.js dist/process.d.ts; do
            test ! -e "$sdk/$path"
          done
          ! grep -F '"."' "$sdk/package.json"
          ! grep -F '"./server"' "$sdk/package.json"
          ! grep -F '"./v2/server"' "$sdk/package.json"
          tar -tzf "dist/$ARCHIVE" > "$scratch/archive.txt"
          grep -Fx "$package_dir/bin/hya" "$scratch/archive.txt"
          grep -Fx "$package_dir/bin/hya-backend" "$scratch/archive.txt"
          grep -Fx "$package_dir/bin/hya-ts" "$scratch/archive.txt"
          grep -Fx "$package_dir/lib/hya/hya-tui-ts/LICENSE" "$scratch/archive.txt"
          grep -Fx "$package_dir/lib/hya/hya-tui-ts/UPSTREAM.md" "$scratch/archive.txt"
          grep -Fx "$package_dir/lib/hya/hya-tui-ts/src/main.tsx" "$scratch/archive.txt"
          grep -Fx "$package_dir/lib/hya/hya-tui-ts/bunfig.toml" "$scratch/archive.txt"
          grep -Fx "$package_dir/lib/hya/hya-tui-ts/tsconfig.json" "$scratch/archive.txt"
          grep -F "$package_dir/lib/hya/hya-tui-ts/node_modules/" "$scratch/archive.txt" >/dev/null

      - name: Attest release assets
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with:
          subject-path: |
            dist/*.tar.gz
            dist/SHA256SUMS

      - name: Upload release assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-assets-${{ env.TARGET }}
          path: |
            dist/*.tar.gz
            dist/SHA256SUMS
          if-no-files-found: error

  release:
    name: publish GitHub release
    runs-on: ubuntu-22.04
    needs: build
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate release notes
        shell: bash
        run: test -s CHANGELOG.md

      - name: Download release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: release-assets-*
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          body_path: CHANGELOG.md
          files: dist/*
          fail_on_unmatched_files: true
