name: ci
on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings -C link-arg=-fuse-ld=bfd"
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
      - name: Install Bun 1.3.14
        shell: bash
        run: |
          curl -fsSL https://bun.sh/install | bash -s "bun-v1.3.14"
          test "$("$HOME/.bun/bin/bun" --version)" = "1.3.14"
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
      - name: Prepare TypeScript TUI
        working-directory: packages/hya-tui-ts
        run: |
          "$HOME/.bun/bin/bun" install --frozen-lockfile
          "$HOME/.bun/bin/bun" run typecheck
          "$HOME/.bun/bin/bun" run build
      - name: Build TypeScript TUI test binaries
        run: cargo build --locked -p hya -p hya-backend -p hya-ts --bins
      - name: Test TypeScript TUI
        working-directory: packages/hya-tui-ts
        run: |
          "$HOME/.bun/bin/bun" test
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: build
        run: cargo build --workspace
      - name: clean build artifacts before tests
        run: cargo clean
      - name: test
        run: cargo test --workspace --jobs 1
      - name: install strace
        run: sudo apt-get update && sudo apt-get install -y strace
      - name: verify-no-http (native transport opens zero inet sockets)
        run: bash scripts/verify-no-http.sh
