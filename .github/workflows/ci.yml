name: ci
on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: build
        run: cargo build --workspace
      - name: clean build artifacts before tests
        run: cargo clean
      - name: test
        run: cargo test --workspace --jobs 1
      - name: install strace
        run: sudo apt-get update && sudo apt-get install -y strace
      - name: verify-no-http (native transport opens zero inet sockets)
        run: bash scripts/verify-no-http.sh
